services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      STORAGE_PATH: /data
      SITE_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:8080/api/auth/google/callback
      DESKTOP_SCHEME_URL: prism://auth/callback
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@prism.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Prism}
      RUST_LOG: info
    ports:
      - "8080:8080"
    volumes:
      - clipdata:/data
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      SITE_URL: http://localhost:3000
      API_ORIGIN: http://api:8080
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  clipdata:
