services:
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - prism-pgdata:/var/lib/postgresql/data
    networks:
      - prism-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-dac63701/prism-server@sha256:79d567803c00daf701ef499410a45a61b81f672611c13db8b269bd378289f071}
    container_name: prism-api
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required — e.g. postgres://user:pass@postgres:5432/prism}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — generate a 64-char random string}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8080}
      STORAGE_PATH: ${STORAGE_PATH:-/data}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      DESKTOP_SCHEME_URL: ${DESKTOP_SCHEME_URL:-prism://auth/callback}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
      DEFAULT_MAX_STORAGE_GB: ${DEFAULT_MAX_STORAGE_GB:-10}
      RATE_LIMIT_REQUESTS_PER_MIN: ${RATE_LIMIT_REQUESTS_PER_MIN:-100}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - prism-data:/data
    networks:
      prism-internal:
      nginx-network:
        aliases:
          - api
          - prism-api
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    image: ${WEB_IMAGE:-dac63701/prism-web@sha256:88a816eb1119ed3357fc8575e4953a780f3863c13759bfca6c4fa688150e0752}
    container_name: prism-web
    pull_policy: always
    restart: unless-stopped
    environment:
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      API_ORIGIN: ${API_ORIGIN:-http://api:8080}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    networks:
      nginx-network:
        aliases:
          - web
          - prism-web
      prism-internal:
    depends_on:
      api:
        condition: service_healthy

volumes:
  prism-pgdata:
  prism-data:

networks:
  nginx-network:
    external: true
    name: nginx-network
  prism-internal:
    internal: true
    name: prism-internal
