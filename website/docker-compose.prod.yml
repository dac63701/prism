services:
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - prism-pgdata:/var/lib/postgresql/data
    networks:
      - prism-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: dac63701/prism-server:latest
    container_name: prism-api
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PORT: ${SERVER_PORT}
      STORAGE_PATH: ${STORAGE_PATH}
      SITE_URL: ${SITE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      DESKTOP_SCHEME_URL: ${DESKTOP_SCHEME_URL}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
      DEFAULT_MAX_STORAGE_GB: ${DEFAULT_MAX_STORAGE_GB}
      RATE_LIMIT_REQUESTS_PER_MIN: ${RATE_LIMIT_REQUESTS_PER_MIN}
      RUST_LOG: ${RUST_LOG}
    volumes:
      - prism-data:/data
    networks:
      - prism-internal
      - nginx-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: dac63701/prism-web:latest
    container_name: prism-web
    pull_policy: always
    restart: unless-stopped
    environment:
      SITE_URL: ${SITE_URL}
      API_ORIGIN: ${API_ORIGIN}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    networks:
      - nginx-network
      - prism-internal
    depends_on:
      api:
        condition: service_healthy

volumes:
  prism-pgdata:
  prism-data:

networks:
  nginx-network:
    external: true
    name: nginx-network
  prism-internal:
    internal: true
    name: prism-internal
