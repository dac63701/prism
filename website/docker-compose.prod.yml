services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism}
      POSTGRES_DB: prism
    volumes:
      - prism-pgdata:/var/lib/postgresql/data
    networks:
      - nginx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: dac63701/prism-server:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://prism:${POSTGRES_PASSWORD:-prism}@postgres:5432/prism
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_PATH: /data
      RUST_LOG: ${RUST_LOG:-info}
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      FRONTEND_URL: ${FRONTEND_URL:-https://prism.example.com}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
      DEFAULT_MAX_STORAGE_GB: ${DEFAULT_MAX_STORAGE_GB:-10}
      RATE_LIMIT_REQUESTS_PER_MIN: ${RATE_LIMIT_REQUESTS_PER_MIN:-100}
    volumes:
      - prism-data:/data
    networks:
      - nginx-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  prism-pgdata:
  prism-data:

networks:
  nginx-network:
    external: true
