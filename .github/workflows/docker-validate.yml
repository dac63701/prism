name: Docker Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "website/Cargo.toml"
      - "website/Cargo.lock"
      - "website/Dockerfile"
      - "website/Dockerfile.api"
      - "website/Dockerfile.web"
      - "website/.dockerignore"
      - "website/docker-compose.yml"
      - "website/docker-compose.dev.yml"
      - "website/docker-compose.prod.yml"
      - "website/src/**"
      - "website/frontend/**"
      - "website/.env.example"
      - ".dockerignore"
      - ".github/workflows/docker-validate.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            file: ./website/Dockerfile.api
            scope: prism-api
          - service: web
            file: ./website/Dockerfile.web
            scope: prism-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ${{ matrix.file }}
          platforms: linux/amd64
          pull: true
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
