name: Docker Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "website/Cargo.toml"
      - "website/Cargo.lock"
      - "website/Dockerfile"
      - "website/Dockerfile.api"
      - "website/Dockerfile.web"
      - "website/.dockerignore"
      - "website/docker-compose.yml"
      - "website/docker-compose.dev.yml"
      - "website/docker-compose.prod.yml"
      - "website/src/**"
      - "website/frontend/**"
      - "website/.env.example"
      - ".dockerignore"
      - ".github/workflows/docker-validate.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate API image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile.api
          platforms: linux/amd64
          pull: true
          push: false
          cache-from: type=gha,scope=prism-api
          cache-to: type=gha,mode=max,scope=prism-api

      - name: Validate Web image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile.web
          platforms: linux/amd64
          pull: true
          push: false
          cache-from: type=gha,scope=prism-web
          cache-to: type=gha,mode=max,scope=prism-web
