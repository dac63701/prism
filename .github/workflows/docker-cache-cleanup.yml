name: Docker Cache Cleanup

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete stale Docker caches
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
            const caches = await github.paginate(github.rest.actions.getActionsCacheList, {
              owner: repo.owner,
              repo: repo.repo,
              per_page: 100,
            });

            for (const cache of caches) {
              const key = cache.key || '';
              const lastAccessed = new Date(cache.last_accessed_at || cache.created_at).getTime();
              const matches = key.includes('prism-api') || key.includes('prism-web');

              if (matches && lastAccessed < cutoff) {
                core.info(`Deleting stale cache ${cache.id} (${key})`);
                await github.rest.actions.deleteActionsCacheById({
                  owner: repo.owner,
                  repo: repo.repo,
                  cache_id: cache.id,
                });
              }
            }
