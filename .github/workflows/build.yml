name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  APP_VERSION: "0.1.0"

jobs:
  # ── Read version from tauri.conf.json ───────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is_release: ${{ steps.check-tag.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: get-version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag
        id: check-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build matrix ───────────────────────────────────────────────────
  build:
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle-suffix: windows
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle-suffix: macos
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle-suffix: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          # Xcode CLI tools are pre-installed on macOS runners

      - name: Build Tauri app
        run: npx tauri build --bundles all
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-${{ matrix.bundle-suffix }}
          path: |
            src-tauri/target/release/bundle/

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    needs: [version, build]
    if: needs.version.outputs.is_release == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release body
        id: changelog
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            PREVIOUS_TAG=$(git tag --sort=-creatordate | head -n 2 | tail -n 1 || echo "")
            if [ -z "$PREVIOUS_TAG" ]; then
              LOG=$(git log --oneline --no-decorate -30)
            else
              LOG=$(git log --oneline --no-decorate "$PREVIOUS_TAG..HEAD")
            fi
          else
            LOG=$(git log --oneline --no-decorate -20)
          fi

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "## Changes" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "Download the latest build for your platform below." >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.version.outputs.version }}
          name: Prism v${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          artifacts: "release-assets/*"
          prerelease: false
          draft: false
          generateReleaseNotes: true
          makeLatest: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
