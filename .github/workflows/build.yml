name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  APP_VERSION: "0.2.3"

jobs:
  # ── Lint & Check (fast, runs on all pushes and PRs) ────────────────
  lint:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (macOS only — has Swift/VideoToolbox)
        if: runner.os == 'macOS'
        run: npm run tauri build

      - name: cargo check (Linux/Windows)
        if: runner.os != 'macOS'
        run: cargo check --manifest-path src-tauri/Cargo.toml

  # ── Read version from tauri.conf.json ───────────────────────────────
  version:
    if: github.event_name != 'pull_request'
    needs: [lint]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is_release: ${{ steps.check-tag.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: get-version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag
        id: check-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build matrix ───────────────────────────────────────────────────
  build:
    if: github.event_name != 'pull_request'
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle-suffix: windows
            bundles: msi,nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle-suffix: macos
            bundles: dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle-suffix: linux
            bundles: deb,appimage

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          # Xcode CLI tools are pre-installed on macOS runners

      - name: Build Tauri app
        run: npx tauri build --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-${{ matrix.bundle-suffix }}
          path: |
            src-tauri/target/release/bundle/

  # ── Create GitHub Release (tags only) ───────────────────────────────
  release:
    if: github.event_name != 'pull_request' && needs.version.outputs.is_release == 'true'
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release body
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | head -n 2 | tail -n 1 || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            LOG=$(git log --oneline --no-decorate -30)
          else
            LOG=$(git log --oneline --no-decorate "$PREVIOUS_TAG..HEAD")
          fi

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "## Changes" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "Download the latest build for your platform below." >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.version.outputs.version }}
          name: Prism v${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          artifacts: "release-assets/*"
          prerelease: false
          draft: false
          generateReleaseNotes: true
          makeLatest: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
