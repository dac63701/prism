name: Docker Publish

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            dac63701/prism-server:latest
            dac63701/prism-server:${{ github.sha }}
          cache-from: type=gha,scope=prism-api
          cache-to: type=gha,mode=max,scope=prism-api

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            dac63701/prism-web:latest
            dac63701/prism-web:${{ github.sha }}
          cache-from: type=gha,scope=prism-web
          cache-to: type=gha,mode=max,scope=prism-web
