name: Docker Publish

on:
  push:
    branches: [main]
    paths:
      - "website/Cargo.toml"
      - "website/Cargo.lock"
      - "website/Dockerfile"
      - "website/Dockerfile.api"
      - "website/Dockerfile.web"
      - "website/.dockerignore"
      - "website/docker-compose.yml"
      - "website/docker-compose.dev.yml"
      - "website/docker-compose.prod.yml"
      - "website/src/**"
      - "website/frontend/**"
      - "website/.env.example"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            file: ./website/Dockerfile.api
            image: dac63701/prism-server
            scope: prism-api
          - service: web
            file: ./website/Dockerfile.web
            image: dac63701/prism-web
            scope: prism-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
