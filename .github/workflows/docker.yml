name: Docker CI/CD

on:
  push:
    branches: [main]
    paths:
      - "website/Cargo.toml"
      - "website/Cargo.lock"
      - "website/Dockerfile"
      - "website/Dockerfile.api"
      - "website/Dockerfile.web"
      - "website/.dockerignore"
      - "website/docker-compose.yml"
      - "website/docker-compose.dev.yml"
      - "website/docker-compose.prod.yml"
      - "website/src/**"
      - "website/frontend/**"
      - "website/.env.example"
      - ".dockerignore"
      - ".github/workflows/docker*.yml"
  pull_request:
    branches: [main]
    paths:
      - "website/Cargo.toml"
      - "website/Cargo.lock"
      - "website/Dockerfile"
      - "website/Dockerfile.api"
      - "website/Dockerfile.web"
      - "website/.dockerignore"
      - "website/docker-compose.yml"
      - "website/docker-compose.dev.yml"
      - "website/docker-compose.prod.yml"
      - "website/src/**"
      - "website/frontend/**"
      - "website/.env.example"
      - ".dockerignore"
      - ".github/workflows/docker*.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            file: ./website/Dockerfile.api
            image: dac63701/prism-server
            scope: prism-api
          - service: web
            file: ./website/Dockerfile.web
            image: dac63701/prism-web
            scope: prism-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ${{ matrix.file }}
          platforms: linux/amd64
          pull: true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('{0}:latest,{0}:{1}', matrix.image, github.sha) || '' }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
