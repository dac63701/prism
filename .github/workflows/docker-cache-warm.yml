name: Docker Cache Warm

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Warm API cache
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          pull: true
          push: false
          cache-from: type=gha,scope=prism-api
          cache-to: type=gha,mode=max,scope=prism-api

      - name: Warm Web cache
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile.web
          platforms: linux/amd64,linux/arm64
          pull: true
          push: false
          cache-from: type=gha,scope=prism-web
          cache-to: type=gha,mode=max,scope=prism-web
