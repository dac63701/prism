name: Docker Cache Warm

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            file: ./website/Dockerfile.api
            scope: prism-api
          - service: web
            file: ./website/Dockerfile.web
            scope: prism-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Warm ${{ matrix.service }} cache
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ${{ matrix.file }}
          platforms: linux/amd64
          pull: true
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
